<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TikTok Live Dashboard</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 400px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 0 40px rgba(138, 43, 226, 0.3);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-bottom: 15px;
      outline: none;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, #8a2be2, #ff00ff);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #ff00ff;
    }

    .status {
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
    }

    .connected {
      color: #00ff88;
    }

    .error {
      color: #ff4c4c;
    }

    .alerts {
      margin-top: 20px;
      max-height: 200px;
      overflow-y: auto;
    }

    .alert {
      background: rgba(255, 255, 255, 0.08);
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 10px;
      animation: fadeIn 0.5s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>
<body>

  <div class="container">
    <h2>🔥 TikTok Live Control</h2>

    <input id="username" placeholder="Username TikTok (sin @)">
    <button onclick="connect()">Conectar</button>

    <div id="status" class="status">Desconectado</div>

    <div class="alerts" id="alerts"></div>
  </div>

  <script>
    const socket = io();

    function connect() {
      const username = document.getElementById("username").value;
      if (!username) return alert("Escribe tu username");

      socket.emit("startConnection", { username });
    }

    socket.on("status", (status) => {
      const statusDiv = document.getElementById("status");

      if (status === "connected") {
        statusDiv.innerText = "🟢 Conectado";
        statusDiv.className = "status connected";
      } else {
        statusDiv.innerText = "🔴 Error";
        statusDiv.className = "status error";
      }
    });

    socket.on("gift", (data) => {
      const alertDiv = document.createElement("div");
      alertDiv.className = "alert";
      alertDiv.innerHTML = `🎁 <b>${data.user}</b> envió <b>${data.gift}</b> x${data.amount}`;

      const container = document.getElementById("alerts");
      container.prepend(alertDiv);
    });
  </script>

</body>
</html>
