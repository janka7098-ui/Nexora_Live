<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nexora Live Control</title>
<script src="/socket.io/socket.io.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background: radial-gradient(circle at top,#0f0f1f,#06060f);
    color:white;
}

/* LOGIN */

#login-view{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-card{
    width:380px;
    padding:40px;
    border-radius:25px;
    background:rgba(20,20,40,0.85);
    backdrop-filter:blur(15px);
    box-shadow:0 0 60px rgba(130,0,255,0.4);
    text-align:center;
    animation:fadeIn 1s ease;
}

.logo{
    width:160px;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    margin-bottom:20px;
    background:#1a1a30;
    color:white;
    font-size:14px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#7b2ff7,#00ff9d);
    font-weight:bold;
    font-size:15px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px #00ff9d;
}

.status{
    margin-top:15px;
    font-size:14px;
}

/* DASHBOARD */

#dashboard-view{
    display:none;
    height:100vh;
    display:flex;
}

.sidebar{
    width:240px;
    background:#0e0e1c;
    padding:30px 20px;
    border-right:1px solid rgba(255,255,255,0.05);
}

.sidebar img{
    width:120px;
    margin-bottom:30px;
}

.menu-item{
    padding:12px;
    margin-bottom:10px;
    border-radius:10px;
    background:#141428;
    cursor:pointer;
    transition:0.3s;
}

.menu-item:hover{
    background:linear-gradient(90deg,#7b2ff7,#00ff9d);
}

.main{
    flex:1;
    padding:40px;
}

.topbar{
    background:#111124;
    padding:20px;
    border-radius:15px;
    margin-bottom:25px;
    box-shadow:0 0 20px rgba(0,255,157,0.2);
}

.event-container{
    background:#111124;
    padding:20px;
    border-radius:15px;
    height:60vh;
    overflow-y:auto;
}

.event{
    background:#1a1a35;
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
    border-left:4px solid #00ff9d;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-view">
    <div class="login-card">
        <img src="logo.png" class="logo">
        <input id="username" placeholder="Usuario TikTok sin @" />
        <button onclick="connect()">Conectar a LIVE</button>
        <div class="status" id="status">Desconectado</div>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard-view">

    <div class="sidebar">
        <img src="logo.png">
        <div class="menu-item">Dashboard</div>
        <div class="menu-item">Regalos</div>
        <div class="menu-item">Chat</div>
        <div class="menu-item">Configuración</div>
    </div>

    <div class="main">
        <div class="topbar">
            🟢 Conectado a <span id="liveUser"></span>
        </div>

        <div class="event-container" id="events"></div>
    </div>

</div>

<script>
const socket = io();

function connect(){
    const username=document.getElementById("username").value;
    socket.emit("startConnection",{username});
}

socket.on("status",(msg)=>{
    const status=document.getElementById("status");

    if(msg==="connected"){
        status.innerHTML="🟢 Conectado";
        document.getElementById("login-view").style.display="none";
        document.getElementById("dashboard-view").style.display="flex";
        document.getElementById("liveUser").innerText=
            document.getElementById("username").value;
    }

    if(msg==="error"){
        status.innerHTML="🔴 Error al conectar";
    }

    if(msg==="disconnected"){
        location.reload();
    }
});

socket.on("gift",(data)=>{
    const container=document.getElementById("events");
    const div=document.createElement("div");
    div.className="event";
    div.innerHTML=`🎁 <strong>${data.user}</strong> envió ${data.gift} x${data.amount}`;
    container.prepend(div);
});
</script>

</body>
</html>
