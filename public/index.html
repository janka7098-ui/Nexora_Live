<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nexora Panel</title>
<script src="/socket.io/socket.io.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(160deg,#0b0b18,#050510);
color:white;
height:100vh;
display:flex;
}

/* LOGIN */

#loginScreen{
margin:auto;
background:#111126;
padding:40px;
border-radius:20px;
width:380px;
box-shadow:0 0 40px rgba(123,47,247,0.2);
border:1px solid #1f1f3d;
text-align:center;
}

#loginScreen h2{
margin-bottom:20px;
background:linear-gradient(90deg,#7b2ff7,#00ff9d);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* DASHBOARD */

#dashboard{
display:none;
flex-direction:column;
width:100%;
height:100vh;
}

.topbar{
height:65px;
background:#0e0e1f;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 25px;
border-bottom:1px solid #1f1f3d;
}

.container{
flex:1;
display:flex;
}

.sidebar{
width:230px;
background:#0c0c1c;
padding:20px;
border-right:1px solid #1f1f3d;
text-align:center;
}

.logo-sidebar{
width:140px;
margin:0 auto 25px auto;
display:block;
}

.menu-btn{
width:100%;
padding:12px;
margin-bottom:10px;
background:#161633;
border-radius:10px;
color:white;
cursor:pointer;
transition:0.3s;
border:1px solid transparent;
}

.menu-btn:hover{
background:#1f1f3d;
border-color:#7b2ff7;
box-shadow:0 0 10px rgba(123,47,247,0.3);
}

.main{
flex:1;
padding:25px;
overflow:auto;
}

.section{display:none;}
.section.active{display:block;}

.card-event{
background:#161633;
padding:14px;
border-radius:10px;
margin-bottom:12px;
border-left:4px solid #00ff9d;
}

.action-card{
background:#161633;
padding:12px;
border-radius:10px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
border-left:4px solid #7b2ff7;
}

/* TIENDA VISUAL */

.gift-store{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
gap:12px;
max-height:300px;
overflow-y:auto;
padding:10px;
background:#0f0f22;
border-radius:12px;
border:1px solid #1f1f3d;
margin-bottom:12px;
}

.gift-card{
background:#161633;
border-radius:12px;
padding:10px;
text-align:center;
cursor:pointer;
transition:0.2s;
border:2px solid transparent;
}

.gift-card:hover{
transform:scale(1.05);
border-color:#7b2ff7;
box-shadow:0 0 12px rgba(123,47,247,0.4);
}

.gift-card.selected{
border-color:#00ff9d;
box-shadow:0 0 15px #00ff9d;
}

.gift-card img{
width:50px;
height:50px;
object-fit:contain;
margin-bottom:6px;
}

.gift-name{
font-size:13px;
margin-bottom:4px;
}

.gift-price{
font-size:12px;
color:#00ff9d;
font-weight:bold;
}

/* TTS */

.tts-container{
display:flex;
align-items:center;
gap:12px;
}

.tts-switch{
width:60px;
height:30px;
background:#333;
border-radius:50px;
position:relative;
cursor:pointer;
transition:0.3s;
}

.tts-switch.active{
background:linear-gradient(90deg,#7b2ff7,#00ff9d);
box-shadow:0 0 10px #00ff9d;
}

.tts-circle{
width:24px;
height:24px;
background:white;
border-radius:50%;
position:absolute;
top:3px;
left:3px;
transition:0.3s;
}

.tts-switch.active .tts-circle{
left:33px;
}

.tts-status{
font-weight:bold;
}

.tts-status.on{color:#00ff9d;}
.tts-status.off{color:#ff4d4d;}
</style>
</head>

<body>

<div id="loginScreen">
<h2>NEXORA ACCESS</h2>
<input id="accessKey" placeholder="Clave de acceso">
<input id="tiktokUser" placeholder="Usuario TikTok sin @">
<button onclick="validateAndConnect()">Entrar</button>
<p id="loginMsg"></p>
</div>

<div id="dashboard">

<div class="topbar">
<div>
🟢 Conectado a <strong id="liveUser"></strong>
</div>

<div style="display:flex; align-items:center; gap:20px;">
<div class="tts-container">
<div id="ttsToggle" class="tts-switch active" onclick="toggleTTS()">
<div class="tts-circle"></div>
</div>
<span id="ttsText" class="tts-status on">ACTIVADO</span>
</div>

<select id="voiceSelector"></select>

<button onclick="disconnectLive()">Desconectar</button>
</div>
</div>

<div class="container">

<div class="sidebar">
<img src="/Logo.png" class="logo-sidebar">
<button class="menu-btn" onclick="showSection('chat')">💬 Chat</button>
<button class="menu-btn" onclick="showSection('gifts')">🎁 Regalos</button>
<button class="menu-btn" onclick="showSection('actions')">⚡ Acciones</button>
</div>

<div class="main">

<div id="chat" class="section active"></div>
<div id="gifts" class="section"></div>

<div id="actions" class="section">

<h3>Crear Acción por Regalo</h3>

<input id="giftSearch" placeholder="Buscar regalo...">
<div id="giftStore" class="gift-store"></div>
<input type="hidden" id="actionGift">

<input id="actionFile" placeholder="Ruta sonido ej: /media/rosa.mp3">
<button onclick="createAction()">Crear Acción</button>

<h3 style="margin-top:20px;">Acciones Configuradas</h3>
<div id="actionList"></div>

</div>

</div>
</div>
</div>

<script>
const socket = io();

let tempUsername="";
let ttsEnabled=true;
let actions=[];
let selectedVoice=null;
let allGifts=[];

/* CARGAR REGALOS DESDE SERVIDOR */
async function loadGifts(){
const res=await fetch("/gift-list");
allGifts=await res.json();
renderGiftStore(allGifts);
}

function renderGiftStore(list){
const container=document.getElementById("giftStore");
container.innerHTML="";

list.forEach(g=>{
const div=document.createElement("div");
div.className="gift-card";

div.innerHTML=`
<img src="/regalos/${g.name}.png"
onerror="this.src='/regalos/default.png'">
<div class="gift-name">${g.name}</div>
<div class="gift-price">${g.diamonds} 💎</div>
`;

div.onclick=()=>{
document.querySelectorAll(".gift-card").forEach(c=>c.classList.remove("selected"));
div.classList.add("selected");
document.getElementById("actionGift").value=g.name;
};

container.appendChild(div);
});
}

function filterGifts(){
const value=document.getElementById("giftSearch").value.toLowerCase();
const filtered=allGifts.filter(g=>g.name.toLowerCase().includes(value));
renderGiftStore(filtered);
}

/* LOGIN Y SOCKETS (igual que antes) */

function validateAndConnect(){
const key=document.getElementById("accessKey").value.trim();
const username=document.getElementById("tiktokUser").value.trim();
if(!key||!username)return;
tempUsername=username;
socket.emit("validateKey",key);
}

socket.on("keyValid",()=>socket.emit("startConnection",{username:tempUsername}));

socket.on("status",(status)=>{
if(status==="connected"){
document.getElementById("loginScreen").style.display="none";
document.getElementById("dashboard").style.display="flex";
document.getElementById("liveUser").innerText=tempUsername;
loadGifts();
}
});

/* ACCIONES */

function createAction(){
const gift=document.getElementById("actionGift").value;
const file=document.getElementById("actionFile").value.trim();
if(!gift||!file)return;

actions.push({gift,file});
renderActions();
}

function renderActions(){
const container=document.getElementById("actionList");
container.innerHTML="";
actions.forEach((a,i)=>{
const div=document.createElement("div");
div.className="action-card";
div.innerHTML=`<span>${a.gift}</span>
<button onclick="deleteAction(${i})">❌</button>`;
container.appendChild(div);
});
}

function deleteAction(i){
actions.splice(i,1);
renderActions();
}

/* BUSCADOR */
document.addEventListener("DOMContentLoaded",()=>{
document.getElementById("giftSearch").addEventListener("input",filterGifts);
});
</script>

</body>
</html>
