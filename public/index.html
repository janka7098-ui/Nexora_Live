<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nexora Panel</title>
<script src="/socket.io/socket.io.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
background:radial-gradient(circle at top,#111132,#050510);
color:white;
height:100vh;
overflow:hidden;
}

.logo{
width:120px;
margin-bottom:20px;
}

.screen{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:#141428;
padding:40px;
border-radius:20px;
width:360px;
text-align:center;
}

input, select{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#1a1a35;
color:white;
margin-bottom:12px;
}

button{
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
background:linear-gradient(90deg,#7b2ff7,#00ff9d);
color:white;
width:100%;
}

#dashboard{display:none;height:100vh;display:flex;}

.sidebar{
width:220px;
background:#0e0e1c;
padding:20px;
}

.menu-btn{
width:100%;
padding:10px;
margin-bottom:10px;
background:#1a1a35;
border-radius:8px;
color:white;
cursor:pointer;
}

.main{
flex:1;
padding:20px;
overflow-y:auto;
}

.section{display:none;}
.section.active{display:block;}

.card-event{
background:#1a1a35;
padding:10px;
border-radius:8px;
margin-bottom:10px;
border-left:4px solid #00ff9d;
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}

.action-buttons button{
width:auto;
padding:5px 10px;
font-size:12px;
margin-left:5px;
}

#overlayContainer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}
</style>
</head>
<body>

<!-- ACCESS -->
<div id="accessScreen" class="screen">
<div class="card">
<img src="/Logotipo.png" class="logo">
<input id="accessKey" placeholder="Clave de acceso">
<button onclick="validateKey()">Acceder</button>
<p id="accessStatus"></p>
</div>
</div>

<!-- LOGIN -->
<div id="loginScreen" class="screen" style="display:none;">
<div class="card">
<img src="/Logotipo.png" class="logo">
<input id="username" placeholder="Usuario TikTok sin @">
<button onclick="connectLive()">Conectar LIVE</button>
<p id="status"></p>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div class="sidebar">
<button class="menu-btn" onclick="showSection('chat')">💬 Chat</button>
<button class="menu-btn" onclick="showSection('gifts')">🎁 Regalos</button>
<button class="menu-btn" onclick="showSection('actions')">⚡ Acciones</button>
<button class="menu-btn" onclick="toggleTTS()">🔊 TTS ON/OFF</button>
<button class="menu-btn" onclick="disconnectLive()">⛔ Desconectar</button>
</div>

<div class="main">

<h3>🟢 Conectado a <span id="liveUser"></span></h3>

<div id="chat" class="section active"></div>
<div id="gifts" class="section"></div>

<div id="actions" class="section">

<h3>Crear Acción</h3>

<input id="actionGift" placeholder="Nombre del regalo (ej: Rose)">
<input id="actionAmount" type="number" value="1" placeholder="Cantidad mínima">
<select id="actionType">
<option value="sound">Sonido</option>
<option value="video">Video</option>
<option value="animation">Animación</option>
</select>
<input id="actionFile" placeholder="Ruta archivo (ej: /media/rosa.mp4)">
<button onclick="createAction()">Crear Acción</button>

<br><br>
<h3>Acciones Configuradas</h3>
<div id="actionList"></div>

</div>

</div>
</div>

<div id="overlayContainer"></div>

<script>
const socket = io();
let actions = [];
let ttsEnabled = true;

/* LOGIN */

function validateKey(){
const key=document.getElementById("accessKey").value;
socket.emit("validateKey", key);
}

socket.on("keyValid",()=>{
document.getElementById("accessScreen").style.display="none";
document.getElementById("loginScreen").style.display="flex";
});

socket.on("keyInvalid",()=>{
document.getElementById("accessStatus").innerText="Clave incorrecta";
});

function connectLive(){
const username=document.getElementById("username").value;
socket.emit("startConnection",{username});
}

socket.on("status",(msg)=>{
if(msg==="connected"){
document.getElementById("loginScreen").style.display="none";
document.getElementById("dashboard").style.display="flex";
document.getElementById("liveUser").innerText=document.getElementById("username").value;
}
});

function disconnectLive(){
socket.emit("disconnectLive");
location.reload();
}

function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* TTS */

function speak(text){
if(!ttsEnabled) return;
const speech = new SpeechSynthesisUtterance(text);
speech.lang="es-MX";
window.speechSynthesis.speak(speech);
}

function toggleTTS(){
ttsEnabled = !ttsEnabled;
}

/* EVENTOS */

socket.on("chat",(data)=>{
const div=document.createElement("div");
div.className="card-event";
div.innerHTML=`💬 <span><strong>${data.user}</strong>: ${data.message}</span>`;
document.getElementById("chat").prepend(div);
speak(`${data.user} dice ${data.message}`);
});

socket.on("gift",(data)=>{
const div=document.createElement("div");
div.className="card-event";
div.innerHTML=`🎁 <span><strong>${data.user}</strong> envió ${data.gift} x${data.amount}</span>`;
document.getElementById("gifts").prepend(div);

executeAction(data.gift, data.amount);
});

/* ACCIONES */

function createAction(){

const gift=document.getElementById("actionGift").value.trim();
const minAmount=parseInt(document.getElementById("actionAmount").value);
const type=document.getElementById("actionType").value;
const file=document.getElementById("actionFile").value.trim();

if(!gift || !file) return;

actions.push({
id:Date.now(),
gift,
minAmount,
type,
file,
enabled:true
});

renderActions();
}

function renderActions(){

const container=document.getElementById("actionList");
container.innerHTML="";

actions.forEach(a=>{

const div=document.createElement("div");
div.className="card-event";

div.innerHTML=`
<span>🎁 ${a.gift} (x${a.minAmount}) → ${a.type}</span>
<div class="action-buttons">
<button onclick="toggleAction(${a.id})">${a.enabled ? "ON" : "OFF"}</button>
<button onclick="deleteAction(${a.id})">❌</button>
</div>
`;

container.appendChild(div);
});
}

function toggleAction(id){
const action=actions.find(a=>a.id===id);
action.enabled=!action.enabled;
renderActions();
}

function deleteAction(id){
actions=actions.filter(a=>a.id!==id);
renderActions();
}

function executeAction(giftName, amount){

const action=actions.find(a=>
a.enabled &&
a.gift.toLowerCase()===giftName.toLowerCase() &&
amount>=a.minAmount
);

if(!action) return;

const overlay=document.getElementById("overlayContainer");

if(action.type==="sound"){
new Audio(action.file).play();
}

if(action.type==="video"){
overlay.innerHTML=`<video autoplay style="max-width:60%;">
<source src="${action.file}" type="video/mp4">
</video>`;
setTimeout(()=>overlay.innerHTML="",5000);
}

if(action.type==="animation"){
overlay.innerHTML=`<div style="font-size:60px;">✨ ${giftName} x${amount} ✨</div>`;
setTimeout(()=>overlay.innerHTML="",3000);
}
}
</script>

</body>
</html>
