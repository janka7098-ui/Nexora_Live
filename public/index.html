<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nexora Panel</title>
<script src="/socket.io/socket.io.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(160deg,#0b0b18,#050510);
color:white;
height:100vh;
display:flex;
}

/* ===== TOPBAR ===== */

.topbar{
height:70px;
background:#0e0e1f;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 25px;
border-bottom:1px solid #1f1f3d;
}

.status-box{
display:flex;
align-items:center;
gap:15px;
font-size:18px;
}

.status-dot{
width:10px;
height:10px;
border-radius:50%;
background:#00ff9d;
box-shadow:0 0 10px #00ff9d;
}

.profile-frame{
width:50px;
height:50px;
border-radius:50%;
padding:3px;
background:linear-gradient(90deg,#7b2ff7,#00ff9d);
display:flex;
align-items:center;
justify-content:center;
}

.profile-frame img{
width:100%;
height:100%;
border-radius:50%;
object-fit:cover;
background:#111;
}

.logo-box{
text-align:center;
margin:20px 0;
}

.logo-box img{
width:130px;
}

/* ===== LAYOUT ===== */

.container{
flex:1;
display:flex;
}

.sidebar{
width:240px;
background:#0c0c1c;
padding:20px;
border-right:1px solid #1f1f3d;
}

.menu-btn{
width:100%;
padding:14px;
margin-bottom:12px;
background:#161633;
border-radius:12px;
color:white;
cursor:pointer;
border:none;
transition:0.3s;
}

.menu-btn:hover{
background:#1f1f3d;
box-shadow:0 0 10px rgba(123,47,247,0.4);
}

.main{
flex:1;
padding:30px;
overflow:auto;
}

/* ===== INPUTS ===== */

input{
width:100%;
padding:14px;
margin-bottom:15px;
background:#1a1a35;
border:1px solid #222;
border-radius:10px;
color:white;
font-size:16px;
}

button{
padding:12px 20px;
background:linear-gradient(90deg,#7b2ff7,#00ff9d);
border:none;
border-radius:10px;
color:white;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 15px #00ff9d;
}

.section{display:none;}
.section.active{display:block;}

.tts-container{
display:flex;
align-items:center;
gap:15px;
}

.tts-switch{
width:60px;
height:30px;
background:#333;
border-radius:50px;
position:relative;
cursor:pointer;
}

.tts-switch.active{
background:linear-gradient(90deg,#7b2ff7,#00ff9d);
}

.tts-circle{
width:24px;
height:24px;
background:white;
border-radius:50%;
position:absolute;
top:3px;
left:3px;
transition:0.3s;
}

.tts-switch.active .tts-circle{
left:33px;
}
</style>
</head>

<body>

<div style="width:100%;display:flex;flex-direction:column;">

<!-- TOPBAR -->
<div class="topbar">

<div class="status-box">
<div class="status-dot"></div>
<div id="connectionText">Desconectado</div>
<div class="profile-frame" id="profileContainer" style="display:none;">
<img id="profileImage">
</div>
</div>

<div style="display:flex;align-items:center;gap:20px;">
<div class="tts-container">
<div id="ttsToggle" class="tts-switch active" onclick="toggleTTS()">
<div class="tts-circle"></div>
</div>
<select id="voiceSelector" style="padding:6px;background:#161633;color:white;border:1px solid #222;border-radius:8px;"></select>
</div>

<button onclick="disconnectLive()">Desconectar</button>
</div>

</div>

<!-- CONTENT -->
<div class="container">

<div class="sidebar">

<div class="logo-box">
<img src="Logo.png">
</div>

<button class="menu-btn" onclick="showSection('conexion')">🔌 Conexión</button>
<button class="menu-btn" onclick="showSection('chat')">💬 Chat</button>

</div>

<div class="main">

<!-- CONEXIÓN -->
<div id="conexion" class="section active">
<h2>Vincular Cuenta TikTok</h2>
<br>
<input id="tiktokUser" placeholder="Usuario TikTok sin @">
<input id="accessKey" placeholder="Clave de acceso">
<button onclick="connectTikTok()">Conectar a TikTok LIVE</button>
</div>

<!-- CHAT -->
<div id="chat" class="section">
<h2>Chat en Vivo</h2>
<div id="chatMessages"></div>
</div>

</div>
</div>
</div>

<script>
const socket = io();

let ttsEnabled = true;
let selectedVoice = null;
let currentUsername = "";

/* ======================
   CONECTAR
====================== */

function connectTikTok(){
const username=document.getElementById("tiktokUser").value.trim();
const key=document.getElementById("accessKey").value.trim();

if(!username || !key){
alert("Completa usuario y clave");
return;
}

currentUsername = username;

socket.emit("startConnection",{ username, key });
}

/* ======================
   STATUS
====================== */

socket.on("status",(status)=>{

if(status==="connected"){
document.getElementById("connectionText").innerHTML=
`Conectado como <span style="color:#00ff9d">@${currentUsername}</span>`;
}

if(status==="invalid_key"){
alert("Clave inválida");
}

if(status==="error"){
alert("Error al conectar");
}

if(status==="disconnected"){
location.reload();
}
});

/* ======================
   FOTO PERFIL
====================== */

socket.on("connectedUserData",(data)=>{
if(data.profilePictureUrl){
document.getElementById("profileImage").src=data.profilePictureUrl;
document.getElementById("profileContainer").style.display="flex";
}
});

/* ======================
   CHAT
====================== */

socket.on("chat",(data)=>{
const div=document.createElement("div");
div.innerHTML=`<strong>${data.user}</strong>: ${data.message}`;
document.getElementById("chatMessages").prepend(div);
speak(`${data.user} dice ${data.message}`);
});

/* ======================
   TTS
====================== */

function toggleTTS(){
ttsEnabled=!ttsEnabled;
const toggle=document.getElementById("ttsToggle");
if(ttsEnabled){
toggle.classList.add("active");
}else{
toggle.classList.remove("active");
}
}

function loadVoices(){
const voices = speechSynthesis.getVoices();
const selector = document.getElementById("voiceSelector");
selector.innerHTML = "";

voices.forEach((voice,index)=>{
const option = document.createElement("option");
option.value = index;
option.textContent = `${voice.name} (${voice.lang})`;
selector.appendChild(option);
});

if(voices.length>0){
selectedVoice = voices[0];
}
}

speechSynthesis.onvoiceschanged = loadVoices;

document.addEventListener("DOMContentLoaded",()=>{
loadVoices();
document.getElementById("voiceSelector").addEventListener("change",function(){
const voices = speechSynthesis.getVoices();
selectedVoice = voices[this.value];
});
});

function speak(text){
if(!ttsEnabled) return;

const speech=new SpeechSynthesisUtterance(text);
if(selectedVoice){ speech.voice = selectedVoice; }
window.speechSynthesis.speak(speech);
}

/* ======================
   SECCIONES
====================== */

function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function disconnectLive(){
socket.emit("disconnectLive");
}
</script>

</body>
</html>
