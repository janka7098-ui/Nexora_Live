<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nexora Panel</title>
<script src="/socket.io/socket.io.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
background:radial-gradient(circle at top,#111132,#050510);
color:white;
height:100vh;
overflow:hidden;
}

.logo{
width:120px;
margin-bottom:20px;
}

.screen{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:#141428;
padding:40px;
border-radius:20px;
width:350px;
text-align:center;
}

input, select{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#1a1a35;
color:white;
margin-bottom:15px;
}

button{
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
background:linear-gradient(90deg,#7b2ff7,#00ff9d);
color:white;
width:100%;
}

#dashboard{display:none;height:100vh;display:flex;}

.sidebar{
width:220px;
background:#0e0e1c;
padding:20px;
}

.menu-btn{
width:100%;
padding:10px;
margin-bottom:10px;
background:#1a1a35;
border-radius:8px;
color:white;
cursor:pointer;
}

.main{
flex:1;
padding:20px;
overflow-y:auto;
}

.section{display:none;}
.section.active{display:block;}

.card-event{
background:#1a1a35;
padding:10px;
border-radius:8px;
margin-bottom:10px;
border-left:4px solid #00ff9d;
}

#overlayContainer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}
</style>
</head>
<body>

<div id="accessScreen" class="screen">
<div class="card">
<img src="/Logotipo.png" class="logo">
<input id="accessKey" placeholder="Clave de acceso">
<button onclick="validateKey()">Acceder</button>
<p id="accessStatus"></p>
</div>
</div>

<div id="loginScreen" class="screen" style="display:none;">
<div class="card">
<img src="/Logotipo.png" class="logo">
<input id="username" placeholder="Usuario TikTok sin @">
<button onclick="connectLive()">Conectar LIVE</button>
<p id="status"></p>
</div>
</div>

<div id="dashboard">

<div class="sidebar">
<button class="menu-btn" onclick="showSection('chat')">💬 Chat</button>
<button class="menu-btn" onclick="showSection('gifts')">🎁 Regalos</button>
<button class="menu-btn" onclick="showSection('actions')">⚡ Acciones</button>
<button class="menu-btn" onclick="disconnectLive()">⛔ Desconectar</button>
</div>

<div class="main">
<h3>🟢 Conectado a <span id="liveUser"></span></h3>

<div id="chat" class="section active"></div>
<div id="gifts" class="section"></div>

<div id="actions" class="section">
<h3>Crear Acción</h3>
<input id="actionGift" placeholder="Nombre del regalo (ej: Rose)">
<select id="actionType">
<option value="sound">Sonido</option>
<option value="video">Video</option>
<option value="animation">Animación</option>
</select>
<input id="actionFile" placeholder="Ruta archivo (ej: /media/rosa.mp4)">
<button onclick="createAction()">Crear Acción</button>
<div id="actionList"></div>
</div>

</div>
</div>

<div id="overlayContainer"></div>

<script>
const socket = io();
let actions = [];

/* LOGIN */

function validateKey(){
const key=document.getElementById("accessKey").value;
socket.emit("validateKey", key);
}

socket.on("keyValid",()=>{
document.getElementById("accessScreen").style.display="none";
document.getElementById("loginScreen").style.display="flex";
});

socket.on("keyInvalid",()=>{
document.getElementById("accessStatus").innerText="Clave incorrecta";
});

function connectLive(){
const username=document.getElementById("username").value;
socket.emit("startConnection",{username});
}

socket.on("status",(msg)=>{
if(msg==="connected"){
document.getElementById("loginScreen").style.display="none";
document.getElementById("dashboard").style.display="flex";
document.getElementById("liveUser").innerText=document.getElementById("username").value;
}
});

function disconnectLive(){
socket.emit("disconnectLive");
location.reload();
}

function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* EVENTOS */

socket.on("chat",(data)=>{
const div=document.createElement("div");
div.className="card-event";
div.innerHTML=`💬 <strong>${data.user}</strong>: ${data.message}`;
document.getElementById("chat").prepend(div);
});

socket.on("gift",(data)=>{
const div=document.createElement("div");
div.className="card-event";
div.innerHTML=`🎁 <strong>${data.user}</strong> envió ${data.gift} x${data.amount}`;
document.getElementById("gifts").prepend(div);

executeAction(data.gift);
});

/* ACCIONES */

function createAction(){
const gift=document.getElementById("actionGift").value;
const type=document.getElementById("actionType").value;
const file=document.getElementById("actionFile").value;

actions.push({gift,type,file});
renderActions();
}

function renderActions(){
const container=document.getElementById("actionList");
container.innerHTML="";
actions.forEach(a=>{
const div=document.createElement("div");
div.className="card-event";
div.innerHTML=`🎁 ${a.gift} → ${a.type}`;
container.appendChild(div);
});
}

function executeAction(giftName){
const action=actions.find(a=>a.gift.toLowerCase()===giftName.toLowerCase());
if(!action) return;

const overlay=document.getElementById("overlayContainer");

if(action.type==="sound"){
new Audio(action.file).play();
}

if(action.type==="video"){
overlay.innerHTML=`<video autoplay style="max-width:60%;">
<source src="${action.file}" type="video/mp4">
</video>`;
setTimeout(()=>overlay.innerHTML="",5000);
}

if(action.type==="animation"){
overlay.innerHTML=`<div style="font-size:60px;">✨ ${giftName} ✨</div>`;
setTimeout(()=>overlay.innerHTML="",3000);
}
}
</script>

</body>
</html>
