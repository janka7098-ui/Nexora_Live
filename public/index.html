<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nexora Panel</title>
<script src="/socket.io/socket.io.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
background:radial-gradient(circle at top,#111132,#050510);
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* LOGIN */
.card{
background:#141428;
padding:40px;
border-radius:20px;
width:360px;
text-align:center;
}

input, select{
width:100%;
padding:12px;
margin-bottom:12px;
background:#1a1a35;
border:none;
border-radius:8px;
color:white;
}

button{
width:100%;
padding:12px;
background:linear-gradient(90deg,#7b2ff7,#00ff9d);
border:none;
border-radius:8px;
color:white;
cursor:pointer;
font-weight:bold;
}

/* DASHBOARD */
#dashboard{
display:none;
width:100%;
height:100vh;
flex-direction:column;
}

.topbar{
height:60px;
background:#0e0e1c;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
border-bottom:1px solid #222;
}

.tts-btn{
background:#1a1a35;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
}

.tts-btn.active{
background:linear-gradient(90deg,#7b2ff7,#00ff9d);
}

.container{
flex:1;
display:flex;
}

.sidebar{
width:220px;
background:#0e0e1c;
padding:20px;
}

.menu-btn{
width:100%;
padding:10px;
margin-bottom:10px;
background:#1a1a35;
border-radius:8px;
color:white;
cursor:pointer;
}

.main{
flex:1;
padding:20px;
overflow:auto;
}

.section{display:none;}
.section.active{display:block;}

.card-event{
background:#1a1a35;
padding:12px;
border-radius:8px;
margin-bottom:10px;
border-left:4px solid #00ff9d;
}

.action-card{
background:#1a1a35;
padding:10px;
border-radius:8px;
margin-bottom:8px;
display:flex;
justify-content:space-between;
align-items:center;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="card">
<h2>NEXORA ACCESS</h2>
<input id="accessKey" placeholder="Clave de acceso">
<input id="tiktokUser" placeholder="Usuario TikTok sin @">
<button onclick="validateAndConnect()">Entrar</button>
<p id="loginMsg"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div class="topbar">
<div>
🟢 Conectado a <strong id="liveUser"></strong>
</div>

<div>
<span id="ttsToggle" class="tts-btn active" onclick="toggleTTS()">🔊 TTS ACTIVADO</span>
<button onclick="disconnectLive()">Desconectar</button>
</div>
</div>

<div class="container">

<div class="sidebar">
<button class="menu-btn" onclick="showSection('chat')">💬 Chat</button>
<button class="menu-btn" onclick="showSection('gifts')">🎁 Regalos</button>
<button class="menu-btn" onclick="showSection('actions')">⚡ Acciones</button>
</div>

<div class="main">

<div id="chat" class="section active"></div>
<div id="gifts" class="section"></div>

<div id="actions" class="section">
<h3>Crear Acción por Regalo</h3>

<input id="actionGift" placeholder="Nombre exacto del regalo (ej: Rose)">
<input id="actionFile" placeholder="Ruta sonido ej: /media/rosa.mp3">
<button onclick="createAction()">Crear Acción</button>

<br><br>
<h3>Acciones Configuradas</h3>
<div id="actionList"></div>
</div>

</div>
</div>
</div>

<script>
const socket = io();

let tempUsername = "";
let ttsEnabled = true;
let actions = [];

/* LOGIN */
function validateAndConnect(){
const key=document.getElementById("accessKey").value.trim();
const username=document.getElementById("tiktokUser").value.trim();

if(!key || !username){
document.getElementById("loginMsg").innerText="Completa todos los campos";
return;
}

tempUsername=username;
socket.emit("validateKey", key);
}

socket.on("keyValid",()=>{
socket.emit("startConnection",{ username: tempUsername });
});

socket.on("keyInvalid",()=>{
document.getElementById("loginMsg").innerText="Clave incorrecta";
});

socket.on("status",(status)=>{
if(status==="connected"){
document.getElementById("loginScreen").style.display="none";
document.getElementById("dashboard").style.display="flex";
document.getElementById("liveUser").innerText=tempUsername;
}

if(status==="error"){
document.getElementById("loginMsg").innerText="No se pudo conectar";
}

if(status==="disconnected"){
location.reload();
}
});

/* CHAT + TTS */
function toggleTTS(){
ttsEnabled=!ttsEnabled;
const btn=document.getElementById("ttsToggle");

if(ttsEnabled){
btn.classList.add("active");
btn.innerText="🔊 TTS ACTIVADO";
}else{
btn.classList.remove("active");
btn.innerText="🔇 TTS DESACTIVADO";
}
}

function speak(text){
if(!ttsEnabled) return;
const speech=new SpeechSynthesisUtterance(text);
speech.lang="es-MX";
window.speechSynthesis.speak(speech);
}

socket.on("chat",(data)=>{
const div=document.createElement("div");
div.className="card-event";
div.innerHTML=`💬 <strong>${data.user}</strong>: ${data.message}`;
document.getElementById("chat").prepend(div);
speak(`${data.user} dice ${data.message}`);
});

/* REGALOS */
socket.on("gift",(data)=>{
const div=document.createElement("div");
div.className="card-event";
div.innerHTML=`🎁 <strong>${data.user}</strong> envió ${data.gift} x${data.amount}`;
document.getElementById("gifts").prepend(div);

executeAction(data.gift);
});

/* ACCIONES */
function createAction(){
const gift=document.getElementById("actionGift").value.trim();
const file=document.getElementById("actionFile").value.trim();

if(!gift || !file) return;

actions.push({ gift, file });

renderActions();
}

function renderActions(){
const container=document.getElementById("actionList");
container.innerHTML="";

actions.forEach((a,index)=>{
const div=document.createElement("div");
div.className="action-card";
div.innerHTML=`
<span>🎁 ${a.gift}</span>
<button onclick="deleteAction(${index})">❌</button>
`;
container.appendChild(div);
});
}

function deleteAction(index){
actions.splice(index,1);
renderActions();
}

function executeAction(giftName){
const action=actions.find(a=>a.gift.toLowerCase()===giftName.toLowerCase());
if(!action) return;

const audio=new Audio(action.file);
audio.play().catch(err=>console.log("Error audio:",err));
}

function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function disconnectLive(){
socket.emit("disconnectLive");
}
</script>

</body>
</html>
