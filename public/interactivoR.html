<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lexora Interactive</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{
background:#0a0a12;
color:white;
}
.header{
padding:20px;
background:linear-gradient(90deg,#6d28d9,#00ffa6);
font-weight:700;
font-size:20px;
}
.container{
padding:20px;
max-width:1000px;
margin:auto;
}
.search{
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:#151525;
color:white;
margin-bottom:20px;
}

/* 🔥 NUEVO INPUT USER */
.user-input{
width:100%;
margin-bottom:15px;
}

/* SELECTOR PRO */
.selector{
position:relative;
width:250px;
}
.selected{
background:#1b1b2b;
padding:10px;
border-radius:8px;
cursor:pointer;
}
.dropdown{
position:absolute;
width:100%;
max-height:250px;
overflow-y:auto;
background:#11111c;
border-radius:10px;
margin-top:5px;
display:none;
z-index:10;
}
.item{
display:flex;
align-items:center;
gap:10px;
padding:10px;
cursor:pointer;
}
.item:hover{
background:#1f1f2e;
}
.item img{
width:30px;
height:30px;
}

.add-box{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

input,select{
padding:10px;
border-radius:8px;
border:none;
background:#1b1b2b;
color:white;
}

.table{
width:100%;
border-collapse:collapse;
}

.table th{
padding:12px;
color:#00ffa6;
text-align:left;
}

.row td{
padding:12px;
background:#11111c;
border-bottom:1px solid #1a1a2a;
}

.btn{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.test{
background:#00ffa6;
color:black;
}

.save{
margin-top:20px;
width:100%;
padding:14px;
background:linear-gradient(90deg,#6d28d9,#00ffa6);
border:none;
border-radius:10px;
color:white;
font-weight:700;
}
</style>
</head>

<body>

<div class="header">Lexora Interactive PRO 🚀</div>

<div class="container">

<!-- 🔥 NUEVO: USUARIO ROBLOX -->
<input id="robloxUser" class="user-input" placeholder="Usuario Roblox (a quién afecta)">

<input class="search" placeholder="Buscar evento..." onkeyup="filter()" id="search">

<div class="add-box">

<select id="type">
<option value="gift">🎁 Gift</option>
<option value="like">❤️ Like (cada X)</option>
<option value="follow">➕ Follow</option>
</select>

<!-- SELECTOR VISUAL -->
<div id="giftSelector" class="selector">
<div class="selected" onclick="toggleDropdown()">
<span id="selectedText">Seleccionar regalo</span>
</div>
<div id="dropdown" class="dropdown"></div>
</div>

<input id="newParts" placeholder="Parts (-5)">
<input id="targetLikes" placeholder="Cada cuantos likes (ej: 200)">
<button class="btn test" onclick="add()">Agregar</button>

</div>

<table class="table" id="table">
<tr>
<th>Usuario</th>
<th>Tipo</th>
<th>Nombre</th>
<th>Parts</th>
<th>Meta</th>
<th>Test</th>
</tr>
</table>

<button class="save" onclick="save()">Guardar</button>

</div>

<script>

// 🔥 MULTIUSUARIO
let allEvents = JSON.parse(localStorage.getItem("eventsByUser")) || {}

let selectedGift = ""
let giftImages = {}

function getUser(){
  return document.getElementById("robloxUser").value.trim()
}

function toggleDropdown(){
const d = document.getElementById("dropdown")
d.style.display = d.style.display === "block" ? "none" : "block"
}

// 🔥 CARGAR REGALOS
async function loadGifts(){
try{
const res = await fetch("/gift-list")
const gifts = await res.json()

const dropdown = document.getElementById("dropdown")

gifts.forEach(g=>{

giftImages[g.name.toLowerCase()] = g.image

const div = document.createElement("div")
div.className = "item"

div.innerHTML = `
<img src="${g.image}">
<span>${g.name}</span>
`

div.onclick = ()=>{
selectedGift = g.name
document.getElementById("selectedText").innerText = g.name
dropdown.style.display = "none"
}

dropdown.appendChild(div)

})

}catch(err){
console.log("error gifts")
}
}

loadGifts()

const table = document.getElementById("table")

function render(){

const user = getUser()

table.innerHTML = `
<tr>
<th>Usuario</th>
<th>Tipo</th>
<th>Nombre</th>
<th>Parts</th>
<th>Meta</th>
<th>Test</th>
</tr>
`

if(!user || !allEvents[user]) return

const events = allEvents[user]

Object.keys(events).forEach(name=>{

const e = events[name]
const img = giftImages[name?.toLowerCase()]

const row = document.createElement("tr")
row.className="row"

row.innerHTML = `
<td>${user}</td>

<td>${e.type}</td>

<td>
<div style="display:flex;align-items:center;gap:10px;">
${img ? `<img src="${img}" style="width:30px;height:30px">` : ""}
${name}
</div>
</td>

<td>
<input value="${e.parts}" onchange="update('${name}',this.value)">
</td>

<td>
${e.type === "like" ? e.targetLikes || "-" : "-"}
</td>

<td>
<input id="test-${name}" value="1">
<button class="btn test" onclick="test('${name}')">TEST</button>
</td>
`

table.appendChild(row)

})

}

function add(){

const user = getUser()
if(!user) return alert("Pon usuario Roblox")

const type = document.getElementById("type").value
const parts = Number(document.getElementById("newParts").value)
const targetLikes = Number(document.getElementById("targetLikes").value)

if(!allEvents[user]) allEvents[user] = {}

let key = ""

if(type === "gift"){
if(!selectedGift) return alert("Selecciona un regalo")
key = selectedGift
}

if(type === "like"){
if(!targetLikes) return alert("Pon número de likes")
key = "like_"+targetLikes
}

if(type === "follow"){
key = "follow"
}

allEvents[user][key] = {
type,
parts,
targetLikes: type === "like" ? targetLikes : null,
robloxUser: user
}

render()

}

function update(name,value){
const user = getUser()
allEvents[user][name].parts = Number(value)
}

function test(name){

const user = getUser()
const e = allEvents[user][name]

const amount = Number(document.getElementById(`test-${name}`).value)

fetch("/test",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
gift:name,
repeatCount:amount,
parts:e.parts,
type:e.type,
targetLikes:e.targetLikes,
robloxUser:user
})
})

console.log("TEST:", name, "→", user)

}

function save(){
localStorage.setItem("eventsByUser",JSON.stringify(allEvents))
alert("Guardado por usuario 🔥")
}

function filter(){
const s = document.getElementById("search").value.toLowerCase()
document.querySelectorAll(".row").forEach(r=>{
r.style.display = r.innerText.toLowerCase().includes(s) ? "" : "none"
})
}

// 🔥 cuando cambias usuario → render
document.getElementById("robloxUser").addEventListener("input",render)

render()

</script>

</body>
</html>
